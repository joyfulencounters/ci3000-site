        <td height="80" class="fontsize">千言万语旨在搭建一个汉语词汇的平台，供大家交流和收集自己喜爱和感兴趣的汉语词汇。<br />
          当您想要汇总某一类词汇的时候，比如，您喜欢各种好听的植物名称，那您可以在千言万语创建一个自己的词单，把所有您喜欢的植物名字统统写入这个词单里。<br />
          而有的时候，您可能只是单单的喜爱某一个词，这时您可以使用千言万语的收藏功能，将您所喜爱的零散的词，收藏在一起。</td>
